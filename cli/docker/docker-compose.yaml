version: '3.8'

services:
  backtest:
    image: tripolskypetr/backtest-kit
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: backtest
    ports:
      - "60050:60050"
    restart: unless-stopped
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command:
      - --backtest
      - --symbol
      - BTCUSDT
      - --strategy
      - feb_2026_strategy
      - --exchange
      - ccxt-exchange
      - ./content/feb_2026/feb_2026.strategy.ts
